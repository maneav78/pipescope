# ──────────────────────────────────────────────────────────────────────────────
# PipeScope — CI/CD Security Scan
#
# Runs two jobs in parallel:
#   1. repo-scan   – full local-repo analysis + AI recommendations + job summary
#   2. jenkins-scan – Jenkins-only scan (no repo required)
#
# Job summaries are published to the GitHub Actions run page automatically.
# Reports are uploaded as workflow artifacts.
# ──────────────────────────────────────────────────────────────────────────────
name: PipeScope Security Scan

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      jenkins-url:
        description: Jenkins server URL to scan (optional)
        required: false
        default: ''
      fail-on-high:
        description: Fail build on High/Critical findings
        required: false
        default: 'true'

permissions:
  contents: read
  # Required to write the job summary
  actions: write

jobs:
  # ── 1. Full repository scan ─────────────────────────────────────────────────
  repo-scan:
    name: Repository Scan
    runs-on: ubuntu-latest
    outputs:
      findings-count: ${{ steps.scan.outputs.findings-count }}
      high-count:     ${{ steps.scan.outputs.high-count }}
      critical-count: ${{ steps.scan.outputs.critical-count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks can scan all commits

      - name: Run PipeScope (repo scan)
        id: scan
        uses: ./.github/actions/pipescope
        with:
          target: '.'
          json-output: pipescope-repo-results.json
          pdf-output:  pipescope-repo-report.pdf
          fail-on-high: ${{ github.event.inputs.fail-on-high || 'true' }}
          openai-key:  ${{ secrets.OPENAI_API_KEY }}

      - name: Print finding counts
        if: always()
        run: |
          echo "Total findings : ${{ steps.scan.outputs.findings-count }}"
          echo "High           : ${{ steps.scan.outputs.high-count }}"
          echo "Critical       : ${{ steps.scan.outputs.critical-count }}"

  # ── 2. Jenkins-only scan ────────────────────────────────────────────────────
  jenkins-scan:
    name: Jenkins Scanner
    runs-on: ubuntu-latest
    # Only run when a Jenkins URL is known (workflow_dispatch input or repo secret)
    if: >
      github.event.inputs.jenkins-url != '' ||
      vars.JENKINS_URL != ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run PipeScope (Jenkins scan)
        uses: ./.github/actions/pipescope
        with:
          # No target — remote-only scan
          jenkins-url:  ${{ github.event.inputs.jenkins-url || vars.JENKINS_URL }}
          json-output:  pipescope-jenkins-results.json
          pdf-output:   pipescope-jenkins-report.pdf
          fail-on-high: ${{ github.event.inputs.fail-on-high || 'true' }}
          openai-key:   ${{ secrets.OPENAI_API_KEY }}

  # ── 3. Aggregate results ────────────────────────────────────────────────────
  summary:
    name: Scan Summary
    runs-on: ubuntu-latest
    needs: [repo-scan]
    if: always()

    steps:
      - name: Report status
        run: |
          echo "## PipeScope Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Findings | High | Critical |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repo Scan | ${{ needs.repo-scan.outputs.findings-count }} | ${{ needs.repo-scan.outputs.high-count }} | ${{ needs.repo-scan.outputs.critical-count }} |" >> "$GITHUB_STEP_SUMMARY"
