[[rule]]
id = "PS-SECRET-RSA-001"
severity = "CRITICAL"
cwe = "CWE-798"
description = "Hardcoded RSA private key"
regex = "MIIC[A-Za-z0-9+/=]{200,}"

[[rule]]
id = "PS-SECRET-OAUTH-001"
severity = "HIGH"
cwe = "CWE-798"
description = "Hardcoded OAuth or client secret"
regex = "(?i)(client_secret|authority_secret|oauth_secret)\\s*=\\s*\".{8,}\""

[[rule]]
id = "PS-SECRET-DB-001"
severity = "HIGH"
cwe = "CWE-798"
description = "Hardcoded database password"
regex = "(?i)(DB_PASSWORD|password|passwd)\\s*=\\s*\".{4,}\""

[[rule]]
id = "PS-SECRET-WEAK-001"
severity = "MEDIUM"
cwe = "CWE-798"
description = "Weak default secret value"
regex = "(?i)(secret|jwt_secret|session_secret)\\s*=\\s*\"(secret|changeme|1234|admin)\""
